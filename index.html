<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GradPilots Scholarship Finder</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="header">

<h1 class="logo">
GradPilots <span>Scholarship Finder</span>
</h1>

<button id="darkToggle">🌙</button>

</div>

<div class="stats-bar">

<div class="stat">
<h2>250</h2>
<p>Scholarships</p>
</div>

<div class="stat">
<h2>45</h2>
<p>Full Funding</p>
</div>

<div class="stat">
<h2>12</h2>
<p>Deadlines This Quarter</p>
</div>

</div>


<div class="container">

<div class="filters">

<h3>FILTERS</h3>

<div class="filter-section">

<h4><img src="https://img.icons8.com/ios-filled/20/4a90e2/globe.png"> Country</h4>

<label><input type="checkbox"> USA</label>
<label><input type="checkbox"> UK</label>
<label><input type="checkbox"> Canada</label>
<label><input type="checkbox"> Germany</label>
<label><input type="checkbox"> France</label>

</div>

<hr>

<div class="filter-section">

<h4><img src="https://img.icons8.com/ios-filled/20/4a90e2/graduation-cap.png"> Stream</h4>

<label><input type="checkbox"> Business</label>
<label><input type="checkbox"> Law</label>
<label><input type="checkbox"> IR</label>
<label><input type="checkbox"> STEM</label>

</div>

<hr>

<div class="filter-section">

<h4><img src="https://img.icons8.com/ios-filled/20/4a90e2/bank-card-back-side.png"> Level</h4>

<label><input type="checkbox"> UG</label>
<label><input type="checkbox"> PG</label>
<label><input type="checkbox"> PhD</label>

</div>

<hr>

<div class="filter-section">

<h4><img src="https://img.icons8.com/ios-filled/20/4a90e2/calendar.png"> Deadline</h4>

<select>
<option>Select Date</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
</select>

</div>

<br>

<button class="reset">Reset Filters</button>
<button class="apply">Apply</button>

</div>




<div class="scholarships">

<input type="text" id="searchInput" placeholder="Search scholarships...">

<div class="top-controls">

<div class="view-switch">
<button class="active">Cards</button>
<button>Table</button>
<button>Map</button>
</div>

<div class="sort">

<label>Sort By</label>

<select id="sortOption">
<option value="relevance">Relevance</option>
<option value="amount">Amount</option>
</select>

</div>

</div>

<div id="scholarshipList" class="cards"></div>

<button id="loadMore">Load More</button>

</div>

</div>


<!-- Modal -->
<div id="detailsModal" class="modal">
<div class="modal-content">
<span id="closeModal">&times;</span>
<h2 id="modalTitle"></h2>
<p id="modalCountry"></p>
<p id="modalAmount"></p>
<p id="modalDeadline"></p>
</div>
</div>


<script src="script.js"></script>

</body>
</html>
